<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mond.ai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }
    .box { width: 300px; }
    body { background: #F2EFE9; }
    h1 { font-size: 18px; font-weight: bold; margin-bottom: 32px; display: flex; align-items: center; gap: 9px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 9px 11px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }
    input[type="password"]:focus { border-color: #111; }
    #btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #111;
      color: #fff;
      border: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      cursor: pointer;
    }
    #btn:hover:not(:disabled) { background: #333; }
    #btn:disabled { background: #888; cursor: not-allowed; }
    #msg { margin-top: 12px; font-size: 13px; }
    #msg.error { color: #c00; }
    #msg.info  { color: #666; }
  </style>
</head>
<body>
  <div class="box">
    <h1>
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="11" fill="#1A1816"/>
        <circle cx="17.5" cy="9.5" r="8.5" fill="#F2EFE9"/>
      </svg>
      mond<span style="color:#8C7B6B">.ai</span>
    </h1>
    <label for="pw">Password</label>
    <input type="password" id="pw" autofocus placeholder="Enter password">
    <button id="btn" onclick="login()">Sign in</button>
    <p id="msg"></p>
  </div>

  <script>
    const pw  = document.getElementById('pw');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    async function login() {
      const password = pw.value;
      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      msg.textContent = '';
      msg.className = '';

      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'password=' + encodeURIComponent(password),
          redirect: 'manual',   // handle redirect ourselves
        });

        if (resp.status === 303 || resp.status === 200) {
          // 303 = successful login redirect, 200 = also accepted
          const location = resp.headers.get('location');
          if (location) {
            window.location.href = location;
          } else {
            window.location.href = '/chat';
          }
        } else {
          // Show error returned by server
          const text = await resp.text();
          const match = text.match(/class="error"[^>]*>([^<]+)</);
          msg.textContent = match ? match[1] : 'Incorrect password';
          msg.className = 'error';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          pw.focus();
          pw.select();
        }
      } catch (e) {
        msg.textContent = 'Network error: ' + e.message;
        msg.className = 'error';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    pw.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
