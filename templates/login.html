<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requesty Chat — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }
    .box { width: 300px; }
    h1 { font-size: 18px; font-weight: bold; margin-bottom: 32px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 9px 11px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }
    input[type="password"]:focus { border-color: #111; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #111;
      color: #fff;
      border: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    .error { margin-top: 12px; font-size: 13px; color: #c00; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Requesty Chat</h1>
    <form method="post" action="/login">
      <label for="pw">Password</label>
      <input type="password" id="pw" name="password" autofocus required>
      <button type="submit">Sign in</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
  </div>
</body>
</html>
